name: CI/CD Deploy React Docker App

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Code checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Docker login
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-react-docker:latest .

      # 4. Push Docker Image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-react-docker:latest

      # 5. Deploy to EC2
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-react-docker:latest

            docker stop react-app || true
            docker rm react-app || true

            docker run -d \
              --name react-app \
              -p 80:80 \
              ${{ secrets.DOCKER_USERNAME }}/portfolio-react-docker:latest
